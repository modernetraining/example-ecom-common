 name: Copilot Setup Steps
 
 on:
   workflow_dispatch:
   push:
     paths:
       - .github/workflows/copilot-setup-steps.yml
   pull_request:
     paths:
       - .github/workflows/copilot-setup-steps.yml
 
 jobs:
   copilot-setup-steps:
     runs-on: ubuntu-latest
     permissions:
       contents: read
     steps:
       - uses: actions/checkout@v5
       - name: Install Moderne CLI
         run: |
           curl -fsSL https://docs.moderne.io/cli-install.sh | bash
           echo "$HOME/.moderne/cli/bin" >> "$GITHUB_PATH"
       - name: Verify mod
         run: mod --version